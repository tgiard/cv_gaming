<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none, user-scalable=no">
    <title>CV RPG - Style Game Boy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #111116;
            font-family: 'Courier New', Courier, monospace; /* Style rétro */
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 600px;
            aspect-ratio: 1 / 1; /* Écran carré style Game Boy */
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 4px solid #333;
            background: #2c3e50;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Boîte de dialogue style RPG en bas de l'écran */
        #dialogue-box {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #111;
            border-radius: 4px;
            padding: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #111;
            display: none; /* Cachée par défaut */
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #dialogue-box::after {
            content: " ▼";
            font-size: 10px;
            position: absolute;
            bottom: 5px;
            right: 10px;
            animation: blink 0.8s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #top-hint {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="top-hint">🗺️ Touchez la carte pour vous déplacer et interroger les zones</div>
        <canvas id="rpgCanvas"></canvas>
        <div id="dialogue-box" id="dialogue-text">Bonjour ! Approchez d'une zone pour l'inspecter.</div>
    </div>

    <script>
        const canvas = document.getElementById("rpgCanvas");
        const ctx = canvas.getContext("2d");
        const dialogueBox = document.getElementById("dialogue-box");

        // Résolution carrée fixe pour le moteur de rendu
        canvas.width = 600;
        canvas.height = 600;

        // --- VARIABLES DU JOUEUR ---
        const player = {
            x: 300,
            y: 450,
            targetX: 300, // Destination du clic
            targetY: 450,
            size: 24,
            speed: 4,
            color: "#ff2a6d"
        };

        // --- ZONES D'INFORMATION (Les PNJ / Bornes du CV) ---
        const infoZones = [
            {
                x: 150, y: 150, size: 40, color: "#05d9e8", 
                title: "PROFIL", 
                text: "Thibault - Concepteur Pédagogique & UI. Passionné par la gamification et les expériences interactives !"
            },
            {
                x: 300, y: 150, size: 40, color: "#05d9e8", 
                title: "TECH", 
                text: "Compétences : Intégration HTML5/CSS3, JavaScript (Canvas), Design d'interfaces et architectures applicatives."
            },
            {
                x: 450, y: 150, size: 40, color: "#05d9e8", 
                title: "PROJETS", 
                text: "Dernier projet : Création d'un prototype de jeu fonctionnel et responsive pour Gaming1."
            }
        ];

        let activeZone = null;

        // --- GESTION DES CLICS & TOUCHERS (ORDINATEUR + MOBILE) ---
        function handleInput(clientX, clientY) {
            // Calculer la position exacte du clic relativement à la taille réelle du canvas
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (clientX - rect.left) * scaleX;
            const clickY = (clientY - rect.top) * scaleY;

            // Si une boîte de dialogue est ouverte, le premier clic la ferme
            if (dialogueBox.style.display === "block") {
                dialogueBox.style.display = "none";
                return;
            }

            // Définir la nouvelle cible du joueur
            player.targetX = clickX;
            player.targetY = clickY;
        }

        // Événement Souris (PC)
        window.addEventListener("mousedown", (e) => {
            if(e.target === canvas || dialogueBox.style.display === "block") {
                handleInput(e.clientX, e.clientY);
            }
        });

        // Événement Tactile (Mobile)
        window.addEventListener("touchstart", (e) => {
            if (e.touches.length > 0) {
                handleInput(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        // Fermer la boîte si on clique directement dessus
        dialogueBox.addEventListener("click", () => {
            dialogueBox.style.display = "none";
        });


        // --- LOGIQUE DE MISE À JOUR (UPDATE) ---
        function update() {
            // Calcul de la distance vers la cible
            const dx = player.targetX - player.x;
            const dy = player.targetY - player.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Déplacement fluide vers la cible si on n'est pas encore arrivé
            if (distance > player.speed) {
                player.x += (dx / distance) * player.speed;
                player.y += (dy / distance) * player.speed;
            } else {
                player.x = player.targetX;
                player.y = player.targetY;
            }

            // Détection de proximité avec une zone d'information
            let nearAnyZone = false;
            for (let zone of infoZones) {
                const zDx = zone.x - player.x;
                const zDy = zone.y - player.y;
                const zDist = Math.sqrt(zDx * zDx + zDy * zDy);

                // Si le joueur est très proche de la borne (moins de 45 pixels)
                if (zDist < 45) {
                    nearAnyZone = true;
                    if (activeZone !== zone) {
                        activeZone = zone;
                        // On stoppe le joueur et on affiche la boîte de dialogue
                        player.targetX = player.x;
                        player.targetY = player.y;
                        showDialogue(zone.title, zone.text);
                    }
                }
            }

            if (!nearAnyZone) {
                activeZone = null;
            }
        }

        function showDialogue(title, text) {
            dialogueBox.innerHTML = `<strong>[${title}]</strong><br><br>${text}`;
            dialogueBox.style.display = "block";
        }

        // --- DESSIN DES GRAPHISMES (DRAW) ---
        function draw() {
            // 1. Fond de la carte (herbe / sol rétro)
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grille de fond discrète style dalles RPG
            ctx.strokeStyle = "#219653";
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 2. Dessin des zones informatives (Bornes / PNJ)
            for (let zone of infoZones) {
                // Ombre sous la borne
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                ctx.beginPath();
                ctx.arc(zone.x, zone.y + 10, zone.size / 2, 0, Math.PI * 2);
                ctx.fill();

                // Le socle / Borne
                ctx.fillStyle = zone.color;
                ctx.fillRect(zone.x - zone.size/2, zone.y - zone.size/2, zone.size, zone.size);
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 3;
                ctx.strokeRect(zone.x - zone.size/2, zone.y - zone.size/2, zone.size, zone.size);

                // Point d'interrogation au-dessus
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Courier New";
                ctx.textAlign = "center";
                ctx.fillText("?", zone.x, zone.y + 5);

                // Étiquette de texte de la zone
                ctx.fillStyle = "#111";
                ctx.font = "bold 12px Courier New";
                ctx.fillText(zone.title, zone.x, zone.y - zone.size/2 - 8);
            }

            // 3. Dessin de l'indicateur de cible (un petit cercle discret là où on a cliqué)
            const tDx = player.targetX - player.x;
            const tDy = player.targetY - player.y;
            if (Math.sqrt(tDx*tDx + tDy*tDy) > 5) {
                ctx.strokeStyle = "rgba(255,255,255,0.4)";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.targetX, player.targetY, 8, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 4. Dessin du Personnage (Avatar)
            // Ombre du perso
            ctx.fillStyle = "rgba(0,0,0,0.2)";
            ctx.beginPath();
            ctx.arc(player.x, player.y + player.size/2, player.size/2, 0, Math.PI * 2);
            ctx.fill();

            // Corps
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();

            // Yeux (S'orientent légèrement vers la cible)
            ctx.fillStyle = "#111";
            let eyeOffset = 0;
            if (player.targetX > player.x + 5) eyeOffset = 2;
            if (player.targetX < player.x - 5) eyeOffset = -2;
            ctx.fillRect(player.x - 5 + eyeOffset, player.y - 4, 3, 5);
            ctx.fillRect(player.x + 2 + eyeOffset, player.y - 4, 3, 5);
        }

        // --- BOUCLE PRINCIPALE ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
